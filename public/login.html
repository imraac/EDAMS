<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDAMS Login/Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
/* ---------------- Reset & Form Styles ---------------- */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
form select{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;outline:none;font-size:14px;background:white;}
form select:focus{border-color:#fbbf24;}
body{background:white;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:40px 20px;position:relative;}
.container{width:1200px;max-width:100%;display:flex;justify-content:space-between;align-items:center;gap:50px;opacity:1;transition: opacity 0.3s ease;}
.left{flex:1;}
.back-btn{width:45px;height:45px;background:#fbbf24;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;cursor:pointer;margin-bottom:30px;}
.left small{font-weight:600;color:#444;display:block;margin-bottom:10px;}
.left h1{font-size:38px;font-weight:800;line-height:1.3;max-width:500px;}
.illustration{margin-top:40px;max-width:350px;width:100%;}
.right{flex:1;max-width:490px;background:white;padding:40px;}
.logo{font-size:20px;font-weight:700;margin-bottom:20px;}
.toggle{display:flex;margin-bottom:25px;}
.toggle button{flex:1;padding:10px;border:none;cursor:pointer;font-weight:600;background:#eee;}
.toggle .active{background:#fbbf24;color:white;}
form{display:none;}
form.active-form{display:block;}
form label{font-size:14px;font-weight:600;display:block;margin-bottom:6px;margin-top:15px;}
form input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;outline:none;}
.signin-btn{width:100%;margin-top:20px;padding:12px;border:none;background:#fbbf24;color:white;font-weight:600;border-radius:6px;cursor:pointer;}
@media(max-width:900px){.container{flex-direction:column;text-align:center;}}

/* ---------------- Loader ---------------- */
#loginLoader {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none; /* hidden by default */
  z-index: 9999;
}

.dot-spinner {
  --uib-size: 2rem; /* slightly bigger spinner */
  --uib-speed: 1.2s;
  --uib-color: #183153;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  height: var(--uib-size);
  width: var(--uib-size);
}

.dot-spinner__dot {
  position: absolute;
  top: 0;
  left: 0;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  height: 100%;
  width: 100%;
}

.dot-spinner__dot::before {
  content: '';
  height: 20%;
  width: 20%;
  border-radius: 50%;
  background-color: var(--uib-color);
  transform: scale(0);
  opacity: 0.5;
  animation: pulse0112 calc(var(--uib-speed) * 1.111) ease-in-out infinite;
  box-shadow: 0 0 3px rgba(18, 31, 53, 0.3);
}

.dot-spinner__dot:nth-child(2) { transform: rotate(45deg); }
.dot-spinner__dot:nth-child(2)::before { animation-delay: calc(var(--uib-speed) * -0.875); }
.dot-spinner__dot:nth-child(3) { transform: rotate(90deg); }
.dot-spinner__dot:nth-child(3)::before { animation-delay: calc(var(--uib-speed) * -0.75); }
.dot-spinner__dot:nth-child(4) { transform: rotate(135deg); }
.dot-spinner__dot:nth-child(4)::before { animation-delay: calc(var(--uib-speed) * -0.625); }
.dot-spinner__dot:nth-child(5) { transform: rotate(180deg); }
.dot-spinner__dot:nth-child(5)::before { animation-delay: calc(var(--uib-speed) * -0.5); }
.dot-spinner__dot:nth-child(6) { transform: rotate(225deg); }
.dot-spinner__dot:nth-child(6)::before { animation-delay: calc(var(--uib-speed) * -0.375); }
.dot-spinner__dot:nth-child(7) { transform: rotate(270deg); }
.dot-spinner__dot:nth-child(7)::before { animation-delay: calc(var(--uib-speed) * -0.25); }
.dot-spinner__dot:nth-child(8) { transform: rotate(315deg); }
.dot-spinner__dot:nth-child(8)::before { animation-delay: calc(var(--uib-speed) * -0.125); }

@keyframes pulse0112 {
  0%, 100% { transform: scale(0); opacity: 0.5; }
  50% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>

<!-- Login Loader -->
<div id="loginLoader" class="dot-spinner">
  <div class="dot-spinner__dot"></div>
  <div class="dot-spinner__dot"></div>
  <div class="dot-spinner__dot"></div>
  <div class="dot-spinner__dot"></div>
  <div class="dot-spinner__dot"></div>
  <div class="dot-spinner__dot"></div>
  <div class="dot-spinner__dot"></div>
  <div class="dot-spinner__dot"></div>
</div>

<!-- Main container -->
<div class="container">

    <div class="left">
        <a href="./index.html" class="back-btn">&#8592;</a>
        <small>EDAMS</small>
        <h1>Welcome to <br>Emergency Donation and Aid Management System (EDAMS)</h1>
        <img src="Assets/newlogo.png" alt="EDAMS Logo" class="illustration">
    </div>

    <div class="right">
        <div class="logo">Emergency Donation and Aid Management System (EDAMS)</div>

        <div class="toggle">
            <button id="loginBtn" class="active">Login</button>
            <button id="registerBtn">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="active-form">
            <label>Email Address</label>
            <input type="email" placeholder="your.email@example.com" required>
            <label>Password</label>
            <input type="password" placeholder="Enter your password" required>
            <button type="submit" class="signin-btn">Sign In</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
            <label>Email Address</label>
            <input type="email" placeholder="your.email@example.com" required>
            <label>Password</label>
            <input type="password" placeholder="Create password" required>
            <label>Select Role</label>
            <select required>
                <option value="" disabled selected>Choose your role</option>
                <option value="donor">Donor</option>
                <option value="volunteer">Volunteer</option>
                <option value="admin">Admin</option>
            </select>
            <button type="submit" class="signin-btn">Register</button>
        </form>

    </div>

</div>

<script>
const BASE_URL = "http://127.0.0.1:5000"; 

const loginBtn = document.getElementById("loginBtn");
const registerBtn = document.getElementById("registerBtn");
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");
const loginLoader = document.getElementById("loginLoader");

loginBtn.addEventListener("click", () => {
    loginBtn.classList.add("active");
    registerBtn.classList.remove("active");
    loginForm.classList.add("active-form");
    registerForm.classList.remove("active-form");
});

registerBtn.addEventListener("click", () => {
    registerBtn.classList.add("active");
    loginBtn.classList.remove("active");
    registerForm.classList.add("active-form");
    loginForm.classList.remove("active-form");
});

// Show spinner for at least 5s during login
async function loginWithLoader(email, password) {
    loginLoader.style.display = "flex"; // show spinner
    const start = Date.now();
    try {
        const res = await axios.post(`${BASE_URL}/auth/login`, { email, password });
        const elapsed = Date.now() - start;
        if (elapsed < 5000) await new Promise(r => setTimeout(r, 5000 - elapsed));
        loginLoader.style.display = "none";
        localStorage.setItem("access_token", res.data.access_token);
        window.location.href = "http://127.0.0.1:5502/public/UserDashboard.html";
    } catch (err) {
        loginLoader.style.display = "none";
        alert(err.response?.data?.message || "Login failed");
        console.error(err);
    }
}

// Login form submit
loginForm.addEventListener("submit", (e) => {
    e.preventDefault();
    const email = loginForm.querySelector('input[type="email"]').value;
    const password = loginForm.querySelector('input[type="password"]').value;
    loginWithLoader(email, password);
});

// Register form submit
registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = registerForm.querySelector('input[type="text"]').value;
    const email = registerForm.querySelector('input[type="email"]').value;
    const password = registerForm.querySelector('input[type="password"]').value;
    const role = registerForm.querySelector('select').value;

    try {
        const res = await axios.post(`${BASE_URL}/auth/register`, { username, email, password, role });
        localStorage.setItem("access_token", res.data.access_token);
        alert(`Account created for ${res.data.user.username}!`);
    } catch (err) {
        alert(err.response?.data?.message || "Registration failed");
        console.error(err);
    }
});
</script>
</body>
</html>
